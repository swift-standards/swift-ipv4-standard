name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + test matrix — see swift-institute/.github/.github/workflows/swift-ci.yml
  ci:
    uses: swift-institute/.github/.github/workflows/swift-ci.yml@v1
    with:
      cache-key-prefix: swift63-spm-v1
      enable-private-repos: true
    secrets:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}

  # DocC umbrella-catalog pipeline per [DOC-019a] — see
  # swift-institute/.github/.github/workflows/swift-docs.yml
  docs:
    uses: swift-institute/.github/.github/workflows/swift-docs.yml@v1
    with:
      umbrella-module: IPv4_Standard
      umbrella-display-name: "IPv4 Standard"
      umbrella-bundle-id: "swift-ipv4-standard.IPv4-Standard"
      umbrella-docc-path: "Sources/IPv4 Standard/IPv4 Standard.docc"
      exclude-modules: ""
      enable-private-repos: true
    secrets:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
